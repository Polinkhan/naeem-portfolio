name: CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: naeem-portfolio-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build application
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Lint
        run: yarn lint

      - name: Build
        run: yarn build

      - name: Create deployment archive
        run: |
          rm -f build.tar.gz
          tar -czf build.tar.gz -C dist .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: naeem-portfolio-build
          path: build.tar.gz
          retention-days: 1

  backup:
    name: Backup current application
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Backup current release
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            APP_DIR="${{ secrets.APP_DIR }}"
            BACKUP_DIR="${APP_DIR}_backup"

            mkdir -p "$(dirname "$APP_DIR")"
            sudo rm -rf "$BACKUP_DIR"

            if [ -d "$APP_DIR" ]; then
              sudo mv "$APP_DIR" "$BACKUP_DIR"
            fi

            sudo mkdir -p "$APP_DIR"
            sudo chown -R "$USER:$USER" "$APP_DIR"

  deploy:
    name: Deploy and restart nginx
    runs-on: ubuntu-latest
    needs:
      - build
      - backup
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: naeem-portfolio-build

      - name: Upload deployment archive
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          source: build.tar.gz
          target: ${{ secrets.APP_DIR }}

      - name: Extract build and restart nginx
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            APP_DIR="${{ secrets.APP_DIR }}"

            cd "$APP_DIR"
            tar -xzf build.tar.gz
            rm build.tar.gz

            sudo systemctl restart nginx
